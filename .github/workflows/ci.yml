name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Check ──────────────────────────────────────────────────────────
  check:
    name: fmt + clippy + test
    runs-on: nott-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  # ── Build ──────────────────────────────────────────────────────────
  build:
    name: build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      matrix:
        os: [nott-runners, [self-hosted, macos]]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build asc-mcp
        run: cargo build --release --bin asc-mcp

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.os }}
          path: target/release/asc-mcp

  # ── Release (cross-platform binaries) ──────────────────────────────
  # Tags are created by release.yml (workflow_dispatch), not auto-tag.
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build]
    strategy:
      matrix:
        include:
          - os: nott-runners
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - os: [self-hosted, macos]
            target: aarch64-apple-darwin
            artifact: macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin asc-mcp

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/asc-mcp dist/asc-mcp-${{ matrix.artifact }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.artifact }}
          path: dist/

  # ── Publish GitHub Release ─────────────────────────────────────────
  publish-release:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: nott-runners
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download linux artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-linux-x86_64
          path: dist/

      - name: Download macos artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-macos-arm64
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          generate_release_notes: true
          files: dist/*

  # ── Publish to crates.io ───────────────────────────────────────────
  publish-crate:
    name: publish crate
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: nott-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # stable
        with:
          toolchain: stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty || echo "Version may already be published"

  # ── Publish to npm ─────────────────────────────────────────────────
  publish-npm:
    name: publish npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: nott-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          cd npm
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"

      - name: Publish asc-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public || echo "Version may already be published"

  # ── Publish to PyPI ────────────────────────────────────────────────
  publish-pypi:
    name: publish pypi
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: nott-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Sync version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          sed -i "s/^version = .*/version = \"${VERSION}\"/" python/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" python/menot_you_mcp_asc/__init__.py

      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install build twine
          cd python && python -m build && twine upload dist/* || echo "Version may already be published"
